+        draw(canvas) {
+          const raw = canvas.getAttribute("data-chart");
+          if (!raw) return;
+          let data;
+          try {
+            data = JSON.parse(raw);
+          } catch {
+            return;
+          }
+          const ctx = canvas.getContext("2d");
+          const box = canvas.getBoundingClientRect();
+          const ratio = window.devicePixelRatio || 1;
+          const width = Math.max(280, Math.floor(box.width || 320));
+          const height = Math.max(220, Math.floor(box.height || 300));
+          canvas.width = width * ratio;
+          canvas.height = height * ratio;
+          ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
+          ctx.clearRect(0, 0, width, height);
+          const values = data.values || [];
+          const labels = data.labels || [];
+          const max = Math.max(...values, 1);
+          const padding = { top: 18, right: 10, bottom: 40, left: 42 };
+          const innerWidth = width - padding.left - padding.right;
+          const innerHeight = height - padding.top - padding.bottom;
+          const theme = getComputedStyle(document.body);
+          const line = theme.getPropertyValue("--line").trim();
+          const text = theme.getPropertyValue("--muted").trim();
+          const primary = theme.getPropertyValue("--primary").trim();
+          const success = theme.getPropertyValue("--success").trim();
+
+          ctx.strokeStyle = line;
+          ctx.fillStyle = text;
+          ctx.lineWidth = 1;
+          ctx.font = "12px Segoe UI";
+
+          for (let i = 0; i <= 4; i += 1) {
+            const y = padding.top + (innerHeight / 4) * i;
+            ctx.beginPath();
+            ctx.moveTo(padding.left, y);
+            ctx.lineTo(width - padding.right, y);
+            ctx.stroke();
+          }
+
+          values.forEach((value, index) => {
+            const x = padding.left + (innerWidth / Math.max(values.length - 1, 1)) * index;
+            const y = padding.top + innerHeight - (value / max) * innerHeight;
+            if (canvas.dataset.chartType === "bar") {
+              const barWidth = Math.max(18, innerWidth / Math.max(values.length * 1.8, 1));
+              ctx.fillStyle = primary;
+              ctx.globalAlpha = 0.88;
+              ctx.fillRect(x - barWidth / 2, y, barWidth, padding.top + innerHeight - y);
+              ctx.globalAlpha = 1;
+            }
+            const label = labels[index] || "";
+            ctx.fillStyle = text;
+            ctx.fillText(label, Math.max(0, x - 18), height - 12);
+          });
+
+          if (canvas.dataset.chartType !== "bar" && values.length) {
+            ctx.beginPath();
+            values.forEach((value, index) => {
+              const x = padding.left + (innerWidth / Math.max(values.length - 1, 1)) * index;
+              const y = padding.top + innerHeight - (value / max) * innerHeight;

+              ctx.arc(x, y, 4, 0, Math.PI * 2);
+              ctx.fill();
+            });
+          }
+        }
